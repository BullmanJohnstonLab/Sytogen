<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SyToGen</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/vanilla.css') }}">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

</head>

<body class="page-bg">

<div class="title-bar">
  <h1>SyToGen</h1>
</div>

<div class="main-container content-wrapper">

  <h4><strong>SyToGen</strong> – RM-silencing sequence optimization</h4>

  <p>
    Upload a MotifFinder-annotated GenBank file and a CodonBias table to
    generate an RM-silent construct.
  </p>

  <div class="io-box">
    <form id="sytogen_form">

      <!-- GENBANK -->
      <h5>MotifFinder GenBank</h5>
      <input type="file" id="genbank_input" accept=".gb,.gbk,.gbff" required>

      <br><br>

      <!-- CODON USAGE -->
      <h5>Codon Usage Table (CSV)</h5>
      <input type="file" id="codon_input" accept=".csv" required>

      <br><br>

      <!-- MOTIF TABLE -->
      <h5>Motif Table (from MotifFinder)</h5>
      <input type="file" id="motif_input" accept=".tsv,.csv" required>

      <br><br>

      <div style="text-align:center;">
        <button type="button" class="button-56" onclick="runSyToGen()">
          Run SyToGen
        </button>
        <div id="spinner" style="display:none;">⏳ Processing…</div>
      </div>

    </form>
  </div>
</div>

<script>
async function runSyToGen() {

  const spinner = document.getElementById("spinner");
  spinner.style.display = "block";

  try {

    const gbk = document.getElementById("genbank_input").files[0];
    const codon = document.getElementById("codon_input").files[0];
    const motif = document.getElementById("motif_input").files[0];

    if (!gbk || !codon || !motif) {
      spinner.style.display = "none";
      alert("Please upload all required files.");
      return;}

    const fd = new FormData();

    fd.append("source_type", "genbank");
    fd.append("genbank", gbk);
    fd.append("codon_usage", codon);
    fd.append("motif_table", motif);

    const res = await fetch("/api/sytogen/run", {
      method: "POST",
      body: fd});

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || "SyToGen failed");}

    // ✅ IMPORTANT: read as blob
    const blob = await res.blob();

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "sytogen_output.zip";
    a.click();

    URL.revokeObjectURL(url);

  } catch (error) {

    console.error(error);
    alert(error.message);

  } finally {

    spinner.style.display = "none";
  }
}

</script>

</body>
</html>
